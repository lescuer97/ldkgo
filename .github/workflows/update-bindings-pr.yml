name: Update Bindings PR

on:
  workflow_dispatch:
    inputs:
      cdk_ref:
        description: CDK git ref (tag/branch/SHA)
        required: false
        default: main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  build-platform-bindings:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform_key: linux_amd64
            native_lib: bindings/cdkffi/native/linux_amd64/libcdk_ffi.so
            include_sources: "true"
          - os: macos-latest
            platform_key: darwin_arm64
            native_lib: bindings/cdkffi/native/darwin_arm64/libcdk_ffi.dylib
            include_sources: "false"
    runs-on: ${{ matrix.os }}
    env:
      CDK_REF: ${{ github.event.inputs.cdk_ref || 'main' }}
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Rust and Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform_key }}

      - name: Generate bindings for platform
        run: ./scripts/generate-bindings.sh

      - name: Verify generated package
        run: ./scripts/verify-go.sh

      - name: Prepare artifact bundle
        run: |
          mkdir -p out/bindings/cdkffi/native/${{ matrix.platform_key }}
          cp "${{ matrix.native_lib }}" "out/bindings/cdkffi/native/${{ matrix.platform_key }}/"

          if [ "${{ matrix.include_sources }}" = "true" ]; then
            cp bindings/cdkffi/cdk_ffi.go out/bindings/cdkffi/
            cp bindings/cdkffi/cdk_ffi.h out/bindings/cdkffi/
            cp bindings/cdkffi/CDK_COMMIT out/bindings/cdkffi/
          fi

      - name: Upload platform bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform_key }}
          path: out/

  regenerate-and-pr:
    runs-on: ubuntu-latest
    needs: build-platform-bindings
    env:
      CDK_REF: ${{ github.event.inputs.cdk_ref || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated bundles
        uses: actions/download-artifact@v4
        with:
          path: .artifacts
          merge-multiple: true

      - name: Apply generated bundles to repository
        run: |
          mkdir -p bindings/cdkffi
          cp -R .artifacts/bindings/cdkffi/* bindings/cdkffi/

      - name: Capture generated CDK commit
        id: cdk_commit
        run: echo "value=$(cat bindings/cdkffi/CDK_COMMIT)" >> "$GITHUB_OUTPUT"

      - name: Create pull request when bindings changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update generated cdk go bindings"
          title: "chore: update generated cdk go bindings"
          body: |
            Automated binding refresh.

            - CDK ref requested: `${{ env.CDK_REF }}`
            - Generated commit: `${{ steps.cdk_commit.outputs.value }}`
            - Updated native libs: linux_amd64, darwin_arm64
          branch: automation/update-bindings
          delete-branch: true
          labels: |
            bindings
            automation
