name: Update Bindings PR

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-bindings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Refresh generated metadata
        run: ./scripts/generate-bindings.sh

      - name: Verify generated package
        run: ./scripts/verify-go.sh

      - name: Capture generated LDK Node commit
        id: ldk_node_commit
        run: echo "value=$(cat bindings/ldk_node_ffi/LDK_NODE_COMMIT)" >> "$GITHUB_OUTPUT"

      - name: Create pull request when bindings changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update generated ldk node go bindings"
          title: "chore: update generated ldk node go bindings"
          body: |
            Automated binding refresh.

            - Generated commit: `${{ steps.ldk_node_commit.outputs.value }}`
            - Updated native libs: linux_amd64
          branch: automation/update-bindings
          delete-branch: true
          labels: |
            bindings
            automation
