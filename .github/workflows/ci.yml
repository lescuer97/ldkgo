name: ldkgo CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  generate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ldkgo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Generate bindings
        run: ./scripts/generate-bindings.sh

      - name: Ensure generated source bindings are committed
        run: |
          git diff --exit-code -- \
            bindings/ldk_node_ffi/ldk_node.go \
            bindings/ldk_node_ffi/ldk_node.h \
            bindings/ldk_node_ffi/LDK_NODE_COMMIT \
            bindings/ldk_node_ffi/link_linux_amd64.go \
            bindings/ldk_node_ffi/native/checksums.sha256

      - name: Verify native library was built
        run: |
          test -f bindings/ldk_node_ffi/native/linux_amd64/libldk_node.so || { echo "Native library not found: bindings/ldk_node_ffi/native/linux_amd64/libldk_node.so"; exit 1; }

      - name: Verify native library checksums
        run: ./scripts/verify-checksums.sh

      - name: Verify Go package
        run: ./scripts/verify-go.sh

      - name: Upload generated bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: ldkgo-bindings-linux-amd64-${{ github.sha }}
          path: |
            bindings/ldk_node_ffi
