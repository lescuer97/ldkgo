name: cdkgo Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag for cdkgo (e.g. v0.1.0)
        required: true
      cdk_ref:
        description: Optional CDK ref override (default from bindings/cdkffi/CDK_COMMIT)
        required: false

permissions:
  contents: write

jobs:
  build-assets:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CDK_REF: ${{ github.event.inputs.cdk_ref }}
    steps:
      - name: Checkout cdkgo
        uses: actions/checkout@v4

      - name: Set CDK ref from committed bindings if not provided
        if: ${{ env.CDK_REF == '' }}
        run: echo "CDK_REF=$(cat bindings/cdkffi/CDK_COMMIT)" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Rust and Cargo
        uses: Swatinem/rust-cache@v2

      - name: Regenerate bindings for selected CDK ref
        run: ./scripts/generate-bindings.sh

      - name: Validate committed generated files match selected CDK ref
        run: |
          git diff --exit-code -- bindings/cdkffi/cdk_ffi.go bindings/cdkffi/cdk_ffi.h bindings/cdkffi/CDK_COMMIT

      - name: Verify Go package
        run: ./scripts/verify-go.sh

      - name: Build release asset
        run: |
          mkdir -p dist
          PLATFORM="${{ runner.os }}-${{ runner.arch }}"
          tar -czf "dist/cdkgo-${PLATFORM}.tar.gz" bindings/cdkffi

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdkgo-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --title "cdkgo $TAG" \
              --notes "Go bindings release for cdkgo" \
              dist/*.tar.gz
          fi
