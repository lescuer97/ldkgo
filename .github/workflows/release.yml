name: cdkgo Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag for cdkgo (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cdkgo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Validate committed source bindings exist
        run: |
          test -f bindings/cdkffi/cdk_ffi.go
          test -f bindings/cdkffi/cdk_ffi.h
          test -f bindings/cdkffi/CDK_COMMIT

      - name: Validate committed native libs exist
        run: |
          test -f bindings/cdkffi/native/linux_amd64/libcdk_ffi.so
          test -f bindings/cdkffi/native/darwin_arm64/libcdk_ffi.dylib

      - name: Verify package on Linux
        run: ./scripts/verify-go.sh

      - name: Build release archive
        run: |
          mkdir -p dist
          tar -czf "dist/cdkgo-bindings-${{ github.ref_name || github.event.inputs.release_tag }}.tar.gz" bindings/cdkffi

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --title "cdkgo $TAG" \
              --notes "Go bindings release for cdkgo (includes linux+mac prebuilt libcdk_ffi)" \
              dist/*.tar.gz
          fi
