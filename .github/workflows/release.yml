name: ldkgo Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag for ldkgo (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ldkgo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Validate committed source bindings exist
        run: |
          test -f bindings/ldk_node_ffi/ldk_node.go
          test -f bindings/ldk_node_ffi/ldk_node.h
          test -f bindings/ldk_node_ffi/LDK_NODE_COMMIT

      - name: Validate committed native libs exist
        run: |
          test -f bindings/ldk_node_ffi/native/linux_amd64/libldk_node.so

      - name: Verify native library checksums
        run: ./scripts/verify-checksums.sh

      - name: Verify package on Linux
        run: ./scripts/verify-go.sh

      - name: Build release archive
        run: |
          mkdir -p dist
          tar -czf "dist/ldkgo-bindings-${{ github.ref_name || github.event.inputs.release_tag }}.tar.gz" bindings/ldk_node_ffi

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
              TAG="${{ github.event.inputs.release_tag }}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --title "ldkgo $TAG" \
              --notes "Go bindings release for ldkgo (includes linux amd64 prebuilt libldk_node.so)" \
              dist/*.tar.gz
          fi
